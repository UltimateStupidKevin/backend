version: "3.9"

services:
  db:
    image: mariadb:11.4
    container_name: chess_db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-chess}
      MARIADB_USER: ${DB_USER:-chess}
      MARIADB_PASSWORD: ${DB_PASS:-chesspass}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
      TZ: Europe/Berlin
    volumes:
      - db_data:/var/lib/mysql
    ports:
      - "3307:3306"   
    networks: [chess_net]

volumes:
  db_data:

networks:
  chess_net:
    driver: bridge
